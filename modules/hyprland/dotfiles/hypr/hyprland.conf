#############
### INPUT ###
#############

# https://wiki.hypr.land/Configuring/Variables/#input
input {
    kb_layout = fi
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = -0.5 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = true
        tap-to-click = true
        drag_lock = true
    }
}

# See https://wiki.hypr.land/Configuring/Gestures
gesture = 3, horizontal, workspace

# Example per-device config
# See https://wiki.hypr.land/Configuring/Keywords/#per-device-input-configs for more

device {
    name = 55c133bb77e0
    sensitivity = 0.0
}


###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Window management
bind = $mainMod, X, killactive
bind = $mainMod, C, togglefloating
bind = $mainMod, F, fullscreen
bind = $mainMod, S, togglesplit
bind = $mainMod, T, togglegroup
bind = $mainMod, -, exec, $minimize minimize
# bind = $mainMod, U, exec, $minimize restore-last
bind = $mainMod SHIFT, -, exec, $minimize restore-all

bind = $mainMod, P, exec, hyprpicker -a
bind = $mainMod, R, exec, pkill waybar && waybar && hyprctl reload
bind = ALT, TAB, hyprexpo:expo, toggle #hyprexpo

# Execute program
bind = $mainMod, Q, exec, $terminal --hold fish
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, Z, exec, $launcher
bind = $mainMod, DELETE, exec, $power
bind = $mainMod SHIFT, DELETE, exec, rofi -show p -modi p:$HOME/.local/bin/rofi-power-menu

# Screenshot a region
bind = , PRINT, exec, env HYPRSHOT_DIR=/home/memeiki/Pictures/Screenshots hyprshot -m region
bind = $mainMod, home, exec, env HYPRSHOT_DIR=/home/memeiki/Pictures/Screenshots hyprshot -m region
# Screenshot a monitor
bind = $shiftMod, PRINT, exec, env HYPRSHOT_DIR=/home/memeiki/Pictures/Screenshots hyprshot -m output
# Screenshot a window
bind = $mainMod, PRINT, exec, env HYPRSHOT_DIR=/home/memeiki/Pictures/Screenshots hyprshot -m window

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Resize window with mainMod + shift + arrow keys
binde = $mainMod SHIFT, left, resizeactive, -30 0
binde = $mainMod SHIFT, right, resizeactive, 30 0
binde = $mainMod SHIFT, up, resizeactive, 0 -30
binde = $mainMod SHIFT, down, resizeactive, 0 30

# Move window with mainMod + alt + arrow keys
bind = $mainMod ALT, left, movewindow, l
bind = $mainMod ALT, right, movewindow, r
bind = $mainMod ALT, up, movewindow, u
bind = $mainMod ALT, down, movewindow, d

# Move focus with mainMod + arrow keys
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# Resize window with mainMod + shift + arrow keys
binde = $mainMod SHIFT, H, resizeactive, -30 0
binde = $mainMod SHIFT, L, resizeactive, 30 0
binde = $mainMod SHIFT, K, resizeactive, 0 -30
binde = $mainMod SHIFT, J, resizeactive, 0 30

# Move window with mainMod + alt + arrow keys
bind = $mainMod ALT, H, movewindow, l
bind = $mainMod ALT, L, movewindow, r
bind = $mainMod ALT, K, movewindow, u
bind = $mainMod ALT, J, movewindow, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, focusworkspaceoncurrentmonitor, 1
bind = $mainMod, 2, focusworkspaceoncurrentmonitor, 2
bind = $mainMod, 3, focusworkspaceoncurrentmonitor, 3
bind = $mainMod, 4, focusworkspaceoncurrentmonitor, 4
bind = $mainMod, 5, focusworkspaceoncurrentmonitor, 5
bind = $mainMod, 6, focusworkspaceoncurrentmonitor, 6
bind = $mainMod, 7, focusworkspaceoncurrentmonitor, 7
bind = $mainMod, 8, focusworkspaceoncurrentmonitor, 8
bind = $mainMod, 9, focusworkspaceoncurrentmonitor, 9
bind = $mainMod, 0, focusworkspaceoncurrentmonitor, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Special workspaces

# MENU
bind = $mainMod, TAB, togglespecialworkspace, menu
bind = $mainMod SHIFT, TAB, movetoworkspace, special:menu

# SYSTEM
bind = $mainMod, ESCAPE, togglespecialworkspace, system
bind = $mainMod SHIFT, ESCAPE, movetoworkspace, special:system

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

bindl = $mainMod, PRIOR, exec, playerctl next
bindl = $mainMod, END, exec, playerctl play-pause
bindl = $mainMod, NEXT, exec, playerctl previous

# Use cursor without mouse!
bind = $mainMod, M, submap, mouseMode
submap = mouseMode
binde = $mainMod, H, exec, ydotool mousemove -x -20 -y 0
binde = $mainMod, J, exec, ydotool mousemove -x 0 -y 20
binde = $mainMod, K, exec, ydotool mousemove -x 0 -y -20
binde = $mainMod, L, exec, ydotool mousemove -x 20 -y 0
bind = $mainMod, U, exec, ydotool click 0xC0
bind = $mainMod, I, exec, ydotool click 0xC1

binde = $mainMod, left, exec, ydotool mousemove -x -20 -y 0
binde = $mainMod, down, exec, ydotool mousemove -x 0 -y 20
binde = $mainMod, up, exec, ydotool mousemove -x 0 -y -20
binde = $mainMod, right, exec, ydotool mousemove -x 20 -y 0
bind = $mainMod, RETURN , exec, ydotool click 0xC0
bind = $mainMod, BACKSPACE, exec, ydotool click 0xC1

bind = $mainMod, M, submap, reset
bind = , escape, submap, reset

submap = reset

##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

windowrule {
  name = hyprbars-unfocus
  hyprbars:bar_color = rgba(0, 0, 0, 0.2)
  hyprbars:title_color = rgba(255, 255, 255, 1)
  match:focus = 0
}

# Ignore maximize requests from apps. You'll probably like this.
windowrule {
  name = windowrule-3
  suppress_event = maximize
  match:class = .*
}

windowrule {
  name = windowrule-5
  min_size = 70 70
  match:class = .*
}

# Fix some dragging issues with XWayland
windowrule {
  name = windowrule-4
  no_focus = on
  match:class = ^$
  match:title = ^$
  match:xwayland = 1
  match:float = 1
  match:fullscreen = 0
  match:pin = 0
}


# Wlogout Blur
layerrule {
  name = layerrule-1
  blur = on
  match:namespace = logout_dialog
}


layerrule {
  name = layerrule-2
  blur = on
  match:namespace = class:^(swww)$
}

layerrule {
  name = layerrule-3
  blur = on
  animation = popin 85%
  match:namespace = rofi
}

layerrule {
  name = layerrule-4
  blur = on
  match:class = waybar
}

