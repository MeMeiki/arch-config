# Base packages installed on all systems
# These packages are included regardless of host or modules

description: Base system packages

packages:
  # Essential base system
  - base
  - base-devel

  # Kernel
  - linux
  - linux-firmware

  # Display manager
  - ly

  # Essential tools
  - git
  - nvim

  # dcli dependencies
  - yay          # AUR helper 
  - fzf          # Fuzzy finder   
  - timeshift    # System backup tool 
