
################
### MONITORS ###
################

# See https://wiki.hypr.land/Configuring/Monitors/
monitor = HDMI-A-1, 1920x1080@144, 0x0, 1
monitor = DVI-D-1, 1920x1080@60, 1920x0, 1

# main monitor:
workspace = name:1, monitor:HDMI-A-1

################
### DEFAULTS ###
################

# See https://wiki.hypr.land/Configuring/Keywords/

$terminal = kitty
$fileManager = thunar
$launcher = rofi -show drun
$power = wlogout
$minimize = /usr/local/bin/niflveil

#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hypr.land/Configuring/Variables/

# https://wiki.hypr.land/Configuring/Variables/#general
general {
    gaps_in = 5
    gaps_out = 10

    border_size = 2
    col.active_border = rgba(100,0,255,1)
    col.inactive_border = rgba(200,200,255,1)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = true

    layout = dwindle
    snap:enabled = true
    snap:respect_gaps = true
    snap:window_gap = 20
    snap:monitor_gap = 20
}

# https://wiki.hypr.land/Configuring/Variables/#decoration
decoration {
    rounding = 0
    rounding_power = 3

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = false
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    # https://wiki.hypr.land/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 2
        passes = 3

        vibrancy = 1
    }
}

# https://wiki.hypr.land/Configuring/Variables/#animations
animations {
    enabled = yes, please :)

    # Default curves, see https://wiki.hypr.land/Configuring/Animations/#curves
    #        NAME,           X0,   Y0,   X1,   Y1
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    # Default animations, see https://wiki.hypr.land/Configuring/Animations/
    #           NAME,          ONOFF, SPEED, CURVE,        [STYLE]
    animation = global,        1,     10,    default
    animation = border,        1,     5.39,  easeOutQuint
    animation = windows,       1,     4.79,  easeOutQuint
    animation = windowsIn,     1,     4.1,   easeOutQuint, popin 87%
    animation = windowsOut,    1,     1.49,  linear,       popin 87%
    animation = fadeIn,        1,     1.73,  almostLinear
    animation = fadeOut,       1,     1.46,  almostLinear
    animation = fade,          1,     3.03,  quick
    animation = layers,        1,     3.81,  easeOutQuint
    animation = layersIn,      1,     4,     easeOutQuint, fade
    animation = layersOut,     1,     1.5,   linear,       fade
    animation = fadeLayersIn,  1,     1.79,  almostLinear
    animation = fadeLayersOut, 1,     1.39,  almostLinear
    animation = workspaces,    1,     1.94,  almostLinear, fade
    animation = workspacesIn,  1,     1.21,  almostLinear, fade
    animation = workspacesOut, 1,     1.94,  almostLinear, fade
    animation = zoomFactor,    1,     7,     quick
}

# See https://wiki.hypr.land/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
    smart_split = false
    #single_window_aspect_ratio = 4 3 # Avoid overly wide single-window layouts on wide screens
}

# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
    force_default_wallpaper = -1 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = false # If true disables the random hyprland logo / anime girl background. :(
    size_limits_tiled = false
    font_family = noto serif
    animate_manual_resizes = false
    animate_mouse_windowdragging = false
    initial_workspace_tracking = 1
}

#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)

exec-once = awww-daemon
exec-once = waybar
exec-once = nm-applet
exec-once = blueman-applet
exec-once = systemctl --user start hyprpolkitagent
exec-once = -Dorg.lwjgl.openal.libname=/usr/lib/libopenal.so
exec-once = hyprpm reload
exec-once = ydotoold

## WORKSPACES

# MENU:
exec-once = [workspace special:menu] easyeffects
exec-once = [workspace special:menu] sleep 3; blueman-manager
exec-once = [workspace special:menu] sleep 3; iwgtk
exec-once = [workspace special:menu] sleep 2; pavucontrol

# SYSTEM
exec-once = [workspace special:system] $terminal btop
exec-once = [workspace special:system] sleep 1; $terminal pacseek
exec-once = [workspace special:system] sleep 2; $terminal neo
exec-once = [workspace special:system] sleep 3; $terminal --hold pfetch

# Move cursor back to workspace 1
exec-once = hyprctl dispatch workspace 1


#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hypr.land/Configuring/Environment-variables/

env = XCURSOR_SIZE, 36
env = HYPRCURSOR_SIZE, 36
env = EDITOR, nvim

###############
### PLUGINS ###
###############

# Overview (hyprexpo)
# See https://github.com/hyprwm/hyprland-plugins/tree/main/hyprexpo

plugin {
    hyprexpo {
        columns = 3
        gap_size = 0
        bg_col = rgb(000000)
        workspace_method = center current # [center/first] [workspace] e.g. first 1 or center m+1

        gesture_distance = 300 # how far is the "max" for the gesture
    }
}

# Title bar (hyprbars)
# See https://github.com/hyprwm/hyprland-plugins/tree/main/hyprbars

plugin {
    hyprbars {
        # example config
        bar_height = 23
        bar_color = rgba(100,0,255,0.1)
        bar_blur = true
        bar_text_align = right
	bar_buttons_alignment = right

        bar_text_font = DejaVuSerifCondensed, bold
        bar_text_size = 13
        col.text = rgba(255,255,255,1)

        bar_padding = 3
        bar_part_of_window = true
        bar_precedence_over_border = false

        ## hyprbars-button = color, size, icon, on-click, fgcolor
         hyprbars-button = rgb(6400FF), 13, X, hyprctl dispatch killactive
         hyprbars-button = rgb(6400FF), 13, O, hyprctl dispatch fullscreen 1

        # button options
        bar_button_padding = 4
        inactive_button_color = rgba(255,255,255,1)
        icon_on_hover = true

        # cmd to run on double click of the bar
        on_double_click = hyprctl dispatch fullscreen 1
    }
}

windowrule {
  name = hyprbars-unfocus
  hyprbars:bar_color = rgba(0, 0, 0, 0.5)
  hyprbars:title_color = rgba(255, 255, 255, 1)
  match:focus = 0
}


